name: Setup GitHub Release

on:
  workflow_call:
    inputs:
      git_ref:
        required: true
        type: string
      is_prerelease:
        required: true
        type: boolean

    outputs:
      version:
          description: "The version of the release which can be used e.g. in artifact names."
          value: ${{ jobs.create-release.outputs.version }}

jobs:
  # The create-release job runs purely to initialize the GitHub release itself,
  # and names the release after the provided Git ref (e.g. tag). It's separate
  # from building the release artifacts so that we only create the release once.
  create-release:
    name: create-release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.git_ref }}
          fetch-tags: true

      - name: Set release version
        id: version
        shell: bash
        run: |
          echo "VERSION=${{ inputs.git_ref }}" >> "$GITHUB_ENV"
          echo "version=${{ inputs.git_ref }}" >> "$GITHUB_OUTPUT"

      - name: Show the version
        run: |
          echo "version is: $VERSION"

      - name: Compute nightly changelog link
        if: ${{ inputs.is_prerelease }}
        id: nightly-changelog
        shell: bash
        run: |
          LATEST_STABLE_TAG=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-version:refname | head -n1)
          if [ -z "${LATEST_STABLE_TAG}" ]; then
            echo "body=Nightly build of Caesar." >> "$GITHUB_OUTPUT"
            exit 0
          fi

          {
            echo "body<<EOF"
            echo "Nightly build of Caesar."
            echo
            echo "[Full changelog](https://github.com/${{ github.repository }}/compare/${LATEST_STABLE_TAG}...${{ inputs.git_ref }})"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Check that tag version and Cargo.toml/package.json version are the same
        if: ${{ !inputs.is_prerelease }}
        shell: bash
        # Remove leading v from semantic versioning tag v<major>.<minor>.<patch>
        run: |
          VERSION_WITHOUT_V=${VERSION#v}
          if ! grep -q "version = \"${VERSION_WITHOUT_V}\"" Cargo.toml; then
            echo "version ${VERSION_WITHOUT_V} does not match Cargo.toml" >&2
            exit 1
          fi

          if [ "${VERSION_WITHOUT_V}" != "$(cat vscode-ext/package.json | jq '.version' --raw-output)" ]; then
            echo "version ${VERSION_WITHOUT_V} does not match vscode-ext/package.json" >&2
            exit 1
          fi
      
      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          name: ${{ steps.version.outputs.version }}
          tag_name: ${{ inputs.git_ref }}
          draft: ${{ !inputs.is_prerelease }}
          prerelease: ${{ inputs.is_prerelease }}
          body: ${{ steps.nightly-changelog.outputs.body }}
          generate_release_notes: false

    outputs:
      version: ${{ steps.version.outputs.version }}
